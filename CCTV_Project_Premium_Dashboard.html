            --accent: #0ea5e9;

        .magical-text {

        @keyframes shine { to { background-position: 200% center; } }

        @keyframes blinkRed { 0% { opacity: 1; box-shadow: 0 0 8px #ff4444; } 50% { opacity: 0.3; } 100% { opacity: 1; box-shadow: 0 0 8px #ff4444; } }
        .red-dot { width: 8px; height: 8px; background-color: #ff4444; border-radius: 50%; margin-right: 6px; animation: blinkRed 1s infinite; }

        .header { 
            background: rgba(15, 23, 42, 0.8);

            padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 10; 
            border-bottom: 2px solid var(--accent); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);

        .h-tab { 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; color: #94a3b8; font-weight: 700; display: flex; align-items: center; transition: 0.3s;

        .h-tab.active {

        .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; transition: 0.3s; }
        .online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .dl-controls { display: flex; gap: 5px; align-items: center; }
        .dl-select { 
            font-size: 10px; padding: 2px; border-radius: 3px; background: #1e293b; color: white; border: 1px solid var(--glass-border); outline: none; 
        }

        .search-container { position: relative; display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 4px; padding: 0 8px; margin-right: 10px; border: 1px solid var(--glass-border); }
        .search-input { background: transparent; border: none; color: white; padding: 4px; font-size: 11px; outline: none; width: 120px; }
        .search-input::placeholder { color: #475569; }

        .suggest-container { 
            position: absolute; bottom: 70px; left: 15px; right: 15px; 
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); 
            border-radius: 8px; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); display: none; z-index: 5000; max-height: 180px; overflow-y: auto; 
            border: 1px solid var(--accent); 
        }
        .suggest-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--glass-border); font-size: 13px; font-weight: 600; color: #cbd5e1; transition: 0.2s; }
        .suggest-item:hover { background: var(--accent); color: white; }

        #feed { 
            flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; 
            background: transparent;
        }
        #feed::-webkit-scrollbar { width: 5px; }
        #feed::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .post { 
            background: var(--card); backdrop-filter: blur(8px); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 12px; max-width: 80%; box-shadow: 0 8px 20px rgba(0,0,0,0.2); align-self: flex-start; 
            border-left: 4px solid var(--accent); 
        }
        .post.me { align-self: flex-end; background: rgba(14, 165, 233, 0.1); border-right: 4px solid var(--accent); border-left: 1px solid var(--glass-border); }
        .post img { width: 100%; border-radius: 8px; cursor: zoom-in; margin-top: 8px; border: 1px solid var(--glass-border); }
        .del-btn { color: #ef4444; border: none; background: none; font-size: 9px; cursor: pointer; font-weight: bold; float: right; margin-left: 10px; opacity: 0.6; transition: 0.3s; }
        .del-btn:hover { opacity: 1; text-shadow: 0 0 5px #ef4444; }

        .modal { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        canvas { background: #000; max-width: 100%; max-height: 55%; border: 2px solid var(--accent); border-radius: 4px; cursor: crosshair; box-shadow: 0 0 30px rgba(14, 165, 233, 0.2); }
        
        .footer { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            padding: 10px 15px; border-top: 1px solid var(--glass-border); position: relative; 
        }
        .quick-actions { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .q-btn { border: none; border-radius: 4px; padding: 6px 14px; font-size: 10px; font-weight: 800; color: white; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .input-box { display: flex; gap: 8px; align-items: center; max-width: 1000px; margin: 0 auto; }

</div>

<script>
const firebaseConfig={ apiKey:"AIzaSyC9wcLte6yxFVBW7bb3ZCA_CsyG6X--jDo", authDomain:"team-project-portal.firebaseapp.com", databaseURL:"https://team-project-portal-default-rtdb.firebaseio.com", projectId:"team-project-portal" };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// --- MASTER USER DATABASE ---
const USERS = {

    gaurav: { role:"Team", pass:"Rely@123" }
};

let currentUser = ""; let userRole = ""; let currentGrp = "NewsChannel";
let canvas, ctx, isDrawing = false, startX, startY, baseImage = null;
let activeSuggestTarget = 'main';

const suggestions = ["🔴 LIVE: Check started", "📍 ENTRY: Vehicle detected", "📍 EXIT: Staff out", "⚠️ OBSERVATION: Unauthorized", "✅ Normal: Monitoring"];

db.ref(".info/connected").on("value", (snap) => {
    const sDot = document.getElementById("statusDot");
    const sText = document.getElementById("statusText");
    if (snap.val() === true) { sDot.className = "dot online"; sText.innerText = "Connected"; } 
    else { sDot.className = "dot offline"; sText.innerText = "Reconnecting..."; }
});

// Tracking Login/Logout Logic
function trackActivity(action) {
    if(!currentUser) return;
    const path = `users_activity/${currentUser}`;
    const now = new Date();
    if(action === 'login') {
        db.ref(path).update({ login_time: now.toISOString(), status: 'Online' });
    } else {
        db.ref(path).update({ logout_time: now.toISOString(), status: 'Offline' });
    }
}

function auth() {
    const id = document.getElementById('uID').value.toLowerCase().replace(/\s/g, '');
    const ps = document.getElementById('uPass').value;
    if(USERS[id] && USERS[id].pass === ps) {
        currentUser = id; userRole = USERS[id].role;
        document.getElementById('displayUser').innerText = `| User: ${id}`;
        document.getElementById('roleDisplay').innerText = `(${userRole})`;
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('mainUI').classList.remove('hidden');
        trackActivity('login');
        load();
    } else alert("Access Denied! Invalid Credentials.");
}

// Track tab closure for logout
window.onbeforeunload = function() { trackActivity('logout'); };

function handleSuggest(val, target) {
    activeSuggestTarget = target;
    const box = document.getElementById('suggestBox');
    box.style.bottom = (target === 'modal') ? '160px' : '70px';
    if(!val) { box.style.display = 'none'; return; }
    const matches = suggestions.filter(s => s.toLowerCase().includes(val.toLowerCase()));
    if(matches.length > 0) {
        box.innerHTML = matches.map(m => `<div class="suggest-item" onclick="applySuggest('${m}')">${m}</div>`).join('');
        box.style.display = 'block';
    } else box.style.display = 'none';
}

function applySuggest(txt) {
    const targetId = activeSuggestTarget === 'main' ? 'msg' : 'modalMsg';
    document.getElementById(targetId).value = txt;
    document.getElementById('suggestBox').style.display = 'none';
}

function switchT(el, g) {
    document.querySelectorAll('.h-tab').forEach(t=>{
        t.classList.remove('active');
        if(t.querySelector('.red-dot')) t.querySelector('.red-dot').remove();
    });
    el.classList.add('active');
    const dot = document.createElement('div'); dot.className = 'red-dot';
    el.prepend(dot);
    currentGrp = g; load();
}

function load() {
    const f = document.getElementById('feed');
    const sTerm = document.getElementById('searchTerm').value.toLowerCase();
    db.ref('groups/'+currentGrp).off('value');
    db.ref('groups/'+currentGrp).limitToLast(100).on('value', s => {
        f.innerHTML = "";
        s.forEach(c => {
            const d = c.val();
            const text = (d.text || "").toLowerCase();
            if (sTerm && !text.includes(sTerm) && !d.sender.toLowerCase().includes(sTerm)) return;
            
            // --- PERMISSION LOGIC ---
            // Admins can delete anything. Management & Team only their own.
            const canDel = (userRole === 'Admin' || d.sender === currentUser);
            const canEdit = (userRole === 'Admin' || d.sender === currentUser);

            f.innerHTML += `<div class="post ${d.sender===currentUser?'me':''}">
                <div style="font-size:9px; color:var(--accent); font-weight:900; margin-bottom:3px;">@${d.sender.toUpperCase()}</div>
                ${d.img ? `<img src="${d.img}" onclick="viewImage(this.src)">` : ''}
                <div id="text-${c.key}" style="font-size:13.5px; line-height:1.4;">${d.text || ""}</div>
                <div style="font-size:8px; opacity:0.6; margin-top:5px; display:flex; justify-content:space-between;">
                    <span>${d.time}</span>
                    <div style="display:flex; gap:8px;">
                        ${canEdit?`<span class="del-btn" style="color:#0ea5e9" onclick="editMsg('${c.key}')">EDIT</span>`:''}
                        ${canDel?`<span class="del-btn" onclick="deleteMsg('${c.key}')">REMOVE</span>`:''}
                    </div>
                </div>
            </div>`;
        });
        f.scrollTop = f.scrollHeight;
    });
}

function postToFirebase(dataObj) {
    const now = new Date();
    dataObj.sender = currentUser;
    dataObj.timestamp = now.getTime();
    dataObj.time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    db.ref('groups/'+currentGrp).push(dataObj);
}

function quickPost(prefix) {
    const msgInput = document.getElementById('msg');
    const finalMsg = msgInput.value ? `${prefix}: ${msgInput.value}` : prefix;
    postToFirebase({ text: finalMsg });
    msgInput.value = "";
}

function quickModalPost(prefix) {
    const mInput = document.getElementById('modalMsg');
    mInput.value = mInput.value ? `${prefix}: ${mInput.value}` : prefix;
}

function postText() {
    const t = document.getElementById('msg').value.trim(); if(!t) return;
    postToFirebase({ text: t });
    document.getElementById('msg').value = "";
}

function processImage(file) {
    if(!file) return; 
    const r = new FileReader();
    r.onload = e => {
        const img = new Image();
        img.onload = () => {
            canvas = document.getElementById('canvas'); ctx = canvas.getContext('2d');
            const maxW = 1000; let scale = 1;
            if(img.width > maxW) scale = maxW / img.width;
            canvas.width = img.width * scale; canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height); baseImage = img;
            document.getElementById('modalMsg').value = document.getElementById('msg').value;
            document.getElementById('drawModal').style.display = 'flex';
            setupDrawing();
        };
        img.src = e.target.result;
    };
    r.readAsDataURL(file);
}

function setupDrawing() {
    canvas.onmousedown = e => { 
        isDrawing = true; const rect = canvas.getBoundingClientRect();
        startX = (e.clientX - rect.left) * (canvas.width/rect.width);
        startY = (e.clientY - rect.top) * (canvas.height/rect.height);
    };
    canvas.onmouseup = e => {
        if(!isDrawing) return; const rect = canvas.getBoundingClientRect();
        const endX = (e.clientX - rect.left) * (canvas.width/rect.width);
        const endY = (e.clientY - rect.top) * (canvas.height/rect.height);
        drawArrow(startX, startY, endX, endY); isDrawing = false;
    };
}

function drawArrow(x1, y1, x2, y2) {
    ctx.strokeStyle = "red"; ctx.lineWidth = 10; ctx.lineCap = "round";
    const head = 30; const angle = Math.atan2(y2-y1, x2-x1);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
    ctx.moveTo(x2, y2); ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
    ctx.stroke();
}

function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height); }

function postMarked() {
    const data = canvas.toDataURL("image/webp", 0.5);
    const caption = document.getElementById('modalMsg').value;
    postToFirebase({ img: data, text: caption });
    closePreview(); 
    document.getElementById('msg').value = "";
    document.getElementById('modalMsg').value = "";
}

async function generateFilteredData(type) {
    const timeVal = document.getElementById('timeFilter').value;
    const userVal = document.getElementById('userFilter').value;
    const sTerm = document.getElementById('searchTerm').value.toLowerCase();
    const now = new Date().getTime();
    const cutoff = timeVal === "all" ? 0 : now - (parseInt(timeVal) * 60 * 60 * 1000);
    
    const snap = await db.ref('groups/'+currentGrp).once('value');
    let filteredPosts = [];

    snap.forEach(c => {
        const d = c.val();
        const matchesTime = d.timestamp ? d.timestamp >= cutoff : true;
        const matchesUser = userVal === "all" || d.sender === currentUser;
        const matchesSearch = !sTerm || (d.text || "").toLowerCase().includes(sTerm) || d.sender.toLowerCase().includes(sTerm);
        
        if(matchesTime && matchesUser && matchesSearch) filteredPosts.push(d);
    });

    if(filteredPosts.length === 0) { alert("No data matches current filters."); return; }

    if(type === 'pdf') {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text(`REPORT: ${currentGrp.toUpperCase()}`, 14, 15);
        doc.setFontSize(10);
        doc.text(`Filter: ${timeVal}H | Search: ${sTerm || 'None'} | Date: ${new Date().toLocaleString()}`, 14, 22);
        
        let rows = filteredPosts.map(p => {
            let safeText = (p.text || "(Media Content)")
                .replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '')
                .replace(/[^\x00-\x7F]/g, "")
                .trim();
            return [p.time, p.sender.toUpperCase(), safeText];
        });

        doc.autoTable({ 
            startY: 28, 
            head: [['TIME', 'OPERATOR', 'UPDATE']], 
            body: rows,
            styles: { overflow: 'linebreak', cellPadding: 3, fontSize: 9 },
            columnStyles: { 0: { cellWidth: 30 }, 1: { cellWidth: 35 }, 2: { cellWidth: 'auto' } }
        });
        doc.save(`Shift_Log_${new Date().getTime()}.pdf`);
    } else {
        const zip = new JSZip();
        const folder = zip.folder("Shift_Evidence");
        let count = 0;
        filteredPosts.forEach(p => {
            if(p.img) { folder.file(`Evidence_${count++}_${p.sender}.jpg`, p.img.split(',')[1], {base64: true}); }
        });
        if(count === 0) { alert("No images found in filter."); return; }
        zip.generateAsync({type:"blob"}).then(c => saveAs(c, `Evidence_Pack.zip`));
    }
}

function deleteMsg(key) { if(confirm("Delete this?")) db.ref('groups/'+currentGrp+'/'+key).remove(); }

function editMsg(key) {
    const newText = prompt("Edit your message:");
    if(newText !== null) {
        db.ref('groups/'+currentGrp+'/'+key).update({ text: newText });
    }
}

function closePreview() { document.getElementById('drawModal').style.display='none'; document.getElementById('fIn').value=""; }
function viewImage(src) { const w = window.open(""); w.document.write(`<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center;"><img src="${src}" style="max-width:100%; max-height:100%;"></body>`); }

window.addEventListener('paste', e => {
    const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
    if(item) processImage(item.getAsFile());
});
</script>
